services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 chat_api.asgi:application"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=chat_api.settings
      - DEBUG=True
      - SECRET_KEY=mysimplesecretkeyfordockerchatapi12345
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data: