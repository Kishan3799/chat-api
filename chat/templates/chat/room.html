<!DOCTYPE html>
<html>
<head>
    <title>Chat Room</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f0f0f0; }
        .chat-container { max-width: 600px; margin: 0 auto; background: white; border-radius: 10px; overflow: hidden; }
        .chat-header { background: #667eea; color: white; padding: 20px; }
        .messages { height: 400px; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; }
        .message .username { font-weight: bold; color: #667eea; }
        .input-area { padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .status { padding: 10px 20px; font-size: 12px; background: #f9f9f9; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>💬 Room: {{ room_name }}</h2>
        </div>
        <div class="status" id="status">🔴 Connecting...</div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Type a message..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const roomName = "{{ room_name }}";
        const username = "{{ user.username }}";
        
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${wsProtocol}//${window.location.host}/ws/chat/${roomName}/`);
        
        ws.onopen = function() {
            document.getElementById('status').textContent = '🟢 Connected as ' + username;
        };
        
        ws.onclose = function() {
            document.getElementById('status').textContent = '🔴 Disconnected';
        };
        
        ws.onmessage = function(e) {
            const data = JSON.parse(e.data);
            if (data.type === 'history') {
                data.messages.forEach(msg => addMessage(msg.username, msg.message));
            } else if (data.type === 'message') {
                addMessage(data.username, data.message);
            }
        };
        
        function addMessage(username, message) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<span class="username">${username}:</span> ${message}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function sendMessage() {
            const input = document.getElementById('message-input');
            if (input.value.trim()) {
                ws.send(JSON.stringify({ message: input.value, username: username }));
                input.value = '';
            }
        }
        
        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
